<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title id="page-title">Portfolio</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
  <link rel="icon" type="image/png" href="Images/GitHub-ProfilePicture-removebg-preview.png">
</head>
<body>

<header>
  <div class="brand">
    <img src="" alt="Avatar" id="header-avatar" />
    <div>
      <h1 id="header-name"></h1>
      <div id="header-role" style="font-size:12px;color:var(--muted)"></div>
    </div>
  </div>

  <nav class="nav">
    <button class="btn-accent1" id="nav-btn" onclick="document.getElementById('desarrollo').scrollIntoView({behavior:'smooth'})"></button>
  </nav>
</header>

  <!-- Hero Section -->
  <section class="hero">
    <div class="hero-avatar">
      <img src="" alt="Avatar" id="hero-avatar">
    </div>
    <img src="" style="height: 100px; width: auto; margin-top: -15px" alt="Logo" id="hero-logo">
    <p class="hero-subtitle" id="hero-subtitle"></p>
    <p class="hero-description" id="hero-description"></p>
    <a href="#contacto" class="btn-accent" id="hero-cta"></a>
  </section>

  <div class="container">

    <!-- Proyectos - Desarrollo Web -->
    <section id="desarrollo">
      <h2 class="section-title" id="title-desarrollo"></h2>
      <div class="projects-grid" id="web-projects-grid">
      </div>
    </section>

    <!-- Proyectos - Diseño Gráfico -->
    <section id="diseno">
      <h2 class="section-title" id="title-diseno"></h2>
      <div class="projects-grid" id="design-projects-grid">
      </div>
    </section>

    <!-- Videos -->
    <section id="videos">
      <h2 class="section-title" id="title-videos"></h2>
      <div class="video-grid" id="video-grid">
      </div>
    </section>

    <!-- Sobre Mí -->
    <section id="sobre-mi">
      <h2 class="section-title" id="title-sobreMi"></h2>
      <div class="glass-panel">
        <div class="about-content" id="about-content">
        </div>
      </div>
    </section>

    <!-- Habilidades -->
    <section id="habilidades">
      <h2 class="section-title" id="title-habilidades"></h2>
      <div class="skills-grid" id="skills-grid">
      </div>
    </section>

    <!-- Contacto -->
    <section id="contacto">
      <h2 class="section-title" id="title-contacto"></h2>
      <div class="glass-panel contact-content">
        <p style="color: var(--text-secondary); margin-bottom: 25px; line-height: 1.7;" id="contact-description"></p>
        
        <div class="contact-form">
          <div class="form-group">
            <label for="nombre" id="label-nombre"></label>
            <input type="text" id="nombre">
          </div>
          <div class="form-group">
            <label for="email" id="label-email"></label>
            <input type="email" id="email">
          </div>
          <div class="form-group">
            <label for="mensaje" id="label-mensaje"></label>
            <textarea id="mensaje"></textarea>
          </div>
          <button class="btn-accent" id="btn-submit"></button>
        </div>

        <div class="social-links" id="social-links">
        </div>
      </div>
    </section>

  </div>

  <!-- Footer -->
  <footer>
    <p id="footer-text"></p>
  </footer>

  <script src="script.js"></script>
</body>
</html>
